# GoReleaser configuration for skillm.
# https://goreleaser.com
version: 2

project_name: skillm

before:
  hooks:
    - go mod tidy

builds:
  - id: skillm
    binary: skillm
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/ultrakorne/skillm/cmd.version={{ .Version }}

archives:
  - id: skillm
    ids:
      - skillm
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: ultrakorne
    name: skillm
  draft: false
  prerelease: auto
